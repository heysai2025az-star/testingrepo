<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varnarha - Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            text-shadow: 0 0 60px rgba(255, 107, 107, 0.5);
            animation: gradientShift 4s ease-in-out infinite, float 6s ease-in-out infinite;
            position: relative;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 20%;
            height: 60%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            animation: shimmer 3s ease-in-out infinite;
            z-index: -1;
        }

        .logo::after {
            content: '∞';
            position: absolute;
            font-size: 0.3em;
            top: 30%;
            right: -10%;
            color: rgba(255,255,255,0.6);
            animation: rotate 12s linear infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) scale(1.2); opacity: 0; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .tagline {
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            animation: fadeInUp 2s ease-out 1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .logo-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">Varnarha</div>
        <div class="tagline">Innovation in Motion</div>
    </div>
</body>
</html>
